services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./services/backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://applywise:applywise_local_password@postgres:5432/applywise}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8001}
      CHROMA_URL: ${CHROMA_URL:-http://chromadb:8000}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-local-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai-service:
    build:
      context: ./services/ai-service
    ports:
      - "8001:8001"
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AI_SERVICE_HOST: ${AI_SERVICE_HOST:-0.0.0.0}
      AI_SERVICE_PORT: ${AI_SERVICE_PORT:-8001}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHROMA_URL: ${CHROMA_URL:-http://chromadb:8000}
    depends_on:
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: ./services/scheduler
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://applywise:applywise_local_password@postgres:5432/applywise}
      BACKEND_API_URL: http://backend:8000
      AI_SERVICE_URL: http://ai-service:8001
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-America/Indiana/Indianapolis}
      SCHEDULER_DISCOVERY_ENABLED: ${SCHEDULER_DISCOVERY_ENABLED:-false}
      SCHEDULER_DIGESTS_ENABLED: ${SCHEDULER_DIGESTS_ENABLED:-false}
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-applywise}
      POSTGRES_USER: ${POSTGRES_USER:-applywise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-applywise_local_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8002:8000"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  chroma-data:

